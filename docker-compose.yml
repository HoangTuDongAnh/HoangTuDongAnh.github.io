services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jekyll-blog
    volumes:
      - .:/usr/src/app
      - bundle-cache:/usr/local/bundle
    ports:
      - "4000:4000"
    command: bundle exec jekyll serve --host 0.0.0.0 --livereload

volumes:
  bundle-cache:
