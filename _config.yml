# Blog cong nghe ca nhan chay bang Jekyll + GitHub Pages.
# Neu deploy o repository dang https://username.github.io thi giu baseurl rong.
# Neu deploy o project repository, GitHub Actions ben duoi se tu gan baseurl theo Pages.

lang: "vi"
timezone: "Asia/Ho_Chi_Minh"
title: "Blog Công nghệ của Hoàng"
heading: "Hoàng"
description: "Ghi chú, bài viết và hướng dẫn thực chiến về AI, prompt engineering, phát triển phần mềm và cách xây dựng blog cá nhân bằng Jekyll."
url: "https://hoangtudonganh.github.io"
baseurl: ""

# Thong tin tac gia hien thi trong layout va feed.
author:
  name: "Hoàng"
  bio: "Blogger công nghệ, ghi chú bằng Obsidian và xuất bản bằng Jekyll/GitHub Pages."
  url: "https://hoangtudonganh.github.io/about"

# Asset Configuration
favicon: "/assets/img/favicon.svg"
apple_touch_icon: "/assets/img/icon-192.svg"
og_image: "/assets/img/og-image.svg"
css_file: "/assets/css/style.css"
ie_css: "/assets/css/ie-target.css"

# Preferences
preferences:
  homepage:
    enabled: true
  search:
    enabled: true
  backlinks:
    enabled: true
  pagepreview:
    enabled: true
  wiki_style_link:
    enabled: true

# Menu Items
menu:
  - title: "Trang chủ"
    url: "/"
  - title: "Blog"
    url: "/blog"
  - title: "Ghi chú"
    url: "/notes"
  - title: "Tags"
    url: "/tags"
  - title: "Giới thiệu"
    url: "/about"

# Footer
footer:
  copyright: "© 2026 Hoàng. Nội dung chia sẻ cho mục đích học tập và tham khảo."
  credits:
    enabled: true
    url: "/credits"
    text: "Credits"

# Collections
collections:
  notes:
    output: true
    permalink: /:collection/:name/

# Defaults
# Jekyll se ap dung nhung gia tri nay cho notes/posts de ban khong can lap lai front matter.
defaults:
  - scope:
      path: ""
      type: "notes"
    values:
      layout: "Post"
      content-type: "notes"
      feed: "show"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "Post"
      content-type: "post"
      feed: "show"
      author: "Hoàng"
      permalink: /blog/:title/
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "Post"
      content-type: "static"

# Markdown / syntax highlight
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  math_engine: katex

# RSS, sitemap
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Private links (for broken wiki links)
privatelinks:
  title: "Nội dung chưa xuất bản"
  msg: "Ghi chú hoặc bài viết này chưa được public."

# Math rendering CSS
katex: true

# Search/excerpt
excerpt_separator: "<!--more-->"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - .git/
  - .github/
  - .obsidian/
  - _site/
  - utilities/
  - Dockerfile
  - docker-compose.yml
  - debug.yml
  - blog.code-workspace
  - README.md
  - "*.DS_Store"
