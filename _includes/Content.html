<div class="content">
    {{ content | markdownify }}
</div>

<script>
// Process Obsidian-style wiki links after page load, excluding code blocks.
document.addEventListener('DOMContentLoaded', function() {
    const contentDiv = document.querySelector('.content');
    if (!contentDiv) return;

    const baseurl = "{{ site.baseurl }}";
    const availableDocuments = [
        {%- assign linkables = site.notes | concat: site.posts | concat: site.pages -%}
        {%- assign emitted = 0 -%}
        {%- for item in linkables -%}
            {%- unless item.url contains 'SearchData' or item.url contains '404' or item.feed == 'hide' -%}
                {%- if emitted > 0 -%},{%- endif -%}
                {
                    title: {{ item.title | default: item.name | strip_html | jsonify }},
                    url: {{ item.url | relative_url | jsonify }},
                    excerpt: {{ item.content | strip_html | normalize_whitespace | truncatewords: 24 | jsonify }}
                }
                {%- assign emitted = emitted | plus: 1 -%}
            {%- endunless -%}
        {%- endfor -%}
    ];

    function normalizeTitle(value) {
        return String(value || '').trim().toLowerCase();
    }

    function findDocumentByTitle(title) {
        const normalized = normalizeTitle(title);
        return availableDocuments.find(doc => normalizeTitle(doc.title) === normalized);
    }

    function normalizeAssetUrl(path) {
        if (/^https?:\/\//i.test(path)) return path;
        const clean = String(path || '').replace(/^\/+/, '');
        return (baseurl || '') + '/' + clean.split('/').map(encodeURIComponent).join('/');
    }

    function shouldSkip(node) {
        let parent = node.parentElement;
        while (parent) {
            if (parent.tagName === 'CODE' || parent.tagName === 'PRE' ||
                parent.classList.contains('highlighter-rouge') ||
                parent.classList.contains('highlight')) {
                return true;
            }
            parent = parent.parentElement;
        }
        return false;
    }

    function processWikiLinks(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            if (shouldSkip(node)) return;

            const text = node.textContent;
            const wikiLinkRegex = /(!?)\[\[([^\]]+)\]\]/g;
            let match;
            let lastIndex = 0;
            const fragments = [];

            while ((match = wikiLinkRegex.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    fragments.push(document.createTextNode(text.slice(lastIndex, match.index)));
                }

                const isEmbed = match[1] === '!';
                const rawTarget = match[2].trim();
                const wrapper = document.createElement('span');

                if (isEmbed) {
                    const img = document.createElement('img');
                    const alt = rawTarget.split('/').pop();
                    img.src = normalizeAssetUrl(rawTarget);
                    img.alt = alt;
                    img.loading = 'lazy';
                    img.className = 'obsidian-embed';
                    wrapper.appendChild(img);
                } else if (rawTarget.includes('::')) {
                    const [title, url] = rawTarget.split('::');
                    const link = document.createElement('a');
                    link.href = url;
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    link.textContent = title.trim();
                    wrapper.appendChild(link);
                } else {
                    const [targetTitle, alias] = rawTarget.split('|').map(part => part.trim());
                    const foundDoc = findDocumentByTitle(targetTitle);
                    const link = document.createElement('a');

                    if (foundDoc) {
                        link.href = foundDoc.url;
                        link.textContent = alias || targetTitle;
                        link.className = 'wiki-link';
                        link.addEventListener('mouseenter', function() {
                            showPreview(this, foundDoc.title, foundDoc.excerpt);
                        });
                        link.addEventListener('mouseleave', hidePreview);
                    } else {
                        link.href = 'javascript:void(0)';
                        link.textContent = alias || targetTitle;
                        link.className = 'stale-link';
                        link.title = 'Không tìm thấy nội dung: ' + targetTitle;
                    }

                    wrapper.appendChild(link);
                }

                fragments.push(wrapper);
                lastIndex = match.index + match[0].length;
            }

            if (lastIndex < text.length) {
                fragments.push(document.createTextNode(text.slice(lastIndex)));
            }

            if (fragments.length > 0) {
                const parent = node.parentNode;
                fragments.forEach(fragment => parent.insertBefore(fragment, node));
                parent.removeChild(node);
            }
        } else if (node.nodeType === Node.ELEMENT_NODE) {
            Array.from(node.childNodes).forEach(child => processWikiLinks(child));
        }
    }

    function showPreview(link, title, excerpt) {
        hidePreview();

        const preview = document.createElement('div');
        preview.className = 'link-preview';

        const inner = document.createElement('div');
        inner.className = 'preview-content';
        const strong = document.createElement('strong');
        strong.textContent = title;
        const paragraph = document.createElement('p');
        paragraph.textContent = excerpt;

        inner.appendChild(strong);
        inner.appendChild(paragraph);
        preview.appendChild(inner);
        document.body.appendChild(preview);

        const rect = link.getBoundingClientRect();
        preview.style.position = 'fixed';
        preview.style.left = Math.min(rect.left, window.innerWidth - 340) + 'px';
        preview.style.top = (rect.bottom + 8) + 'px';
        preview.style.zIndex = '1000';
    }

    function hidePreview() {
        const existingPreview = document.querySelector('.link-preview');
        if (existingPreview) existingPreview.remove();
    }

    processWikiLinks(contentDiv);
});
</script>
